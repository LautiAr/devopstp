services:
  api:
    image: lautiar/passmanager:latest
    container_name: passmanager_api
    ports:
      - "5000:5000"
    volumes:
      - db_data:/data
    environment:
      - FLASK_ENV=development
      - SENTRY_DSN=${SENTRY_DSN:-}
      - FERNET_KEY=${FERNET_KEY:-}
      - DATABASE_URL=sqlite:////data/passmanager.db
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:5000/', timeout=3).status==200 else 1)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
volumes:
  db_data:
