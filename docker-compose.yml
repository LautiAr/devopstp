services:
  api:
    build: .
    image: task-api:latest
    container_name: task-api
    ports:
      - "5000:5000"
    environment:
      - SENTRY_DSN=${SENTRY_DSN:-}
      - PORT=5000
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:5000/health', timeout=3).status==200 else 1)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
