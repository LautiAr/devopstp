name: CI/CD

# Workflow de la rama `main`

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Tests ────────────────────────────────────────────────────────────────
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # excluir tests que fallan
      - name: Run pytest
        run: pytest test.py -m "not failing" -v

  # ── 2. Build & push a Docker Hub ────────────────────────────────────────────
  docker:
    name: Build & push Docker image
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Tags generados automáticamente:
      #   - "latest"      → solo en push a main (la rama por defecto)
      #   - "main"        → nombre de la rama
      #   - "sha-<short>" → SHA corto del commit (ej: sha-a1b2c3d)
      #   - "sha-<long>"  → SHA completo, para trazabilidad
      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/passmanager
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Deploy a Render ──────────────────────────────────────────────────────
  deploy:
    name: Deploy to Render
    needs: docker
    runs-on: ubuntu-latest
    # Solo deployamos en push a main, no en PRs.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render deploy hook
        env:
          deploy_url: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" "$deploy_url")
          if [ "$response" != "200" ]; then
            echo "::error::Render deploy hook respondió con código $response"
            exit 1
          fi
          echo "Deploy disparado correctamente en Render"
